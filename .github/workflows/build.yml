# .github/workflows/build.yml
#
# Builds the project for three Linux targets with a single x86_64 c3c:
#   linux-x64      (native)
#   linux-x86      (32-bit, cross-compiled)
#   linux-aarch64  (64-bit ARM, cross-compiled)
#
# Why one runner: c3c only ships an x86_64 Linux binary, so the non-x64 builds
# are cross-compiled. c3c emits the right code via --target; the cross packages
# below supply each target's libc + crt files so the LINK step succeeds.

name: build

on:
  push:
    tags: ["v*"]          # build + release on version tags
  workflow_dispatch: {}
  pull_request: {}

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            apt: ""
          - target: linux-x86
            apt: "gcc-multilib libc6-dev-i386"
          - target: linux-aarch64
            apt: "crossbuild-essential-arm64 libc6-dev-arm64-cross"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # drop if you don't vendor deps as submodules

      - name: Install cross libc (if needed)
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Install c3c
        run: |
          curl -fsSL https://raw.githubusercontent.com/c3lang/c3c/refs/heads/master/install/install.sh | bash
          echo "$HOME/.c3" >> "$GITHUB_PATH"

      - name: Build
        run: |
          c3c --version
          # Base command. For the cross targets you will likely need to point
          # c3c's linker at the target libc — confirm the exact flag with
          # `c3c build --help` and add it here. Candidates to look for: a
          # sysroot option, or a C-compiler override (--cc) you can aim at the
          # cross gcc, e.g. aarch64-linux-gnu-gcc / "gcc -m32".
          c3c build --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          out="myapp-${{ matrix.target }}"
          mkdir -p "dist/$out"
          cp -r build/* "dist/$out"/     # adjust to your emitted binary + libs
          # cp -r assets "dist/$out"/    # runtime assets
          # cp icon.png "dist/$out"/     # your image
          tar -C dist -czf "$out.tar.gz" "$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp-${{ matrix.target }}
          path: myapp-${{ matrix.target }}.tar.gz

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: myapp-${{ matrix.target }}.tar.gz
          fail_on_unmatched_files: false
