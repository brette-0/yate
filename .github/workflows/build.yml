# .github/workflows/build.yml
#
# Builds yate for Linux. Only linux-x64 is active: the raylib6.c3l dependency
# ships prebuilt binaries for linux-x64 only, so 32-bit and aarch64 can't be
# built without first producing raylib for those arches yourself (see notes at
# the bottom of the matrix).

name: build

on:
  push:
    branches: [main]      # gives you the status tick on every push to main
    tags: ["v*"]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64

          # --- blocked by the raylib6.c3l dependency --------------------------
          # linux-x86  : the c3l has no 32-bit raylib binary
          #              ("Library 'raylib6' cannot be used with arch/os 'linux-x86'")
          # linux-aarch64 : the c3l's bindings aren't defined for aarch64
          #              (RLTraceLogCallback missing in raylib.c3i)
          # To enable either, you must build raylib for that arch and drop it
          # into raylib6.c3l/<target>/, then re-add the matrix entry here.

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # drop if you don't vendor deps as submodules

      - name: Install raylib system deps (X11 + GL)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxinerama-dev libxi-dev \
            libxxf86vm-dev libxcursor-dev libgl1-mesa-dev

      - name: Install c3c
        run: |
          curl -fsSL https://raw.githubusercontent.com/c3lang/c3c/refs/heads/master/install/install.sh | bash
          echo "$HOME/.c3" >> "$GITHUB_PATH"

      - name: Build
        run: |
          c3c --version
          c3c build --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          out="yate-${{ matrix.target }}"
          mkdir -p "dist/$out"
          cp build/yate "dist/$out"/
          # cp -r assets "dist/$out"/   # uncomment if yate needs runtime assets
          tar -C dist -czf "$out.tar.gz" "$out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yate-${{ matrix.target }}
          path: yate-${{ matrix.target }}.tar.gz

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: yate-${{ matrix.target }}.tar.gz
          fail_on_unmatched_files: false
